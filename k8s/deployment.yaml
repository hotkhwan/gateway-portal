apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-portal
  namespace: gw
  labels:
    app: gateway-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-portal
  template:
    metadata:
      labels:
        app: gateway-portal
    spec:
      imagePullSecrets:
      - name: harbor-credential
      containers:
      - name: gateway-portal
        image: regis.pointit.co.th/ata/gateway-portal:8490015
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-portal
  namespace: gw
spec:
  selector:
    app: gateway-portal
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
